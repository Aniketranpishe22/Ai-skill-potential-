<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skill Assessor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; }
        input[type="text"] {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #8e44ad;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #732d91; }
        .hidden { display: none; }
        .option-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            background-color: #ecf0f1;
            color: #333;
            text-align: left;
        }
        .option-btn:hover { background-color: #bdc3c7; }
        #loading { color: #e67e22; font-weight: bold; margin-top: 15px; }
        #result { font-weight: bold; font-size: 1.2em; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="selection-screen">
    <h1>AI Skill Assessor</h1>
    <p>Type ANY skill to have the AI generate a custom assessment test for you.</p>
    <input type="text" id="skill-input" placeholder="e.g., Python, Marketing, World History...">
    <br>
    <button onclick="generateQuiz()">Generate My Test</button>
    <p id="loading" class="hidden">🤖 AI is writing your questions... please wait.</p>
</div>

<div class="container hidden" id="quiz-screen">
    <h2 id="quiz-title">Skill Test</h2>
    <p id="question-text">Question goes here...</p>
    <div id="options-container"></div>
</div>

<div class="container hidden" id="result-screen">
    <h1>Assessment Complete</h1>
    <p id="score-text"></p>
    <p id="result-message"></p>
    <button onclick="resetApp()">Test Another Skill</button>
</div>

<script>
    // --- IMPORTANT: PASTE YOUR GEMINI API KEY HERE ---
    const API_KEY = "YOUR_API_KEY_HERE"; 
    // -------------------------------------------------

    let currentQuestions = [];
    let currentSkill = "";
    let currentQuestionIndex = 0;
    let score = 0;

    const selectionScreen = document.getElementById('selection-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const loadingText = document.getElementById('loading');

    async function generateQuiz() {
        const skillInput = document.getElementById('skill-input').value.trim();
        if (!skillInput) {
            alert("Please enter a skill first!");
            return;
        }
        if (API_KEY === "YOUR_API_KEY_HERE") {
            alert("You need to add your API Key to the code first!");
            return;
        }

        currentSkill = skillInput;
        loadingText.classList.remove('hidden');

        // We instruct the AI to return STRICTLY JSON format so our code can read it
        const promptText = `Create a 3-question multiple choice test to assess a user's knowledge in: ${currentSkill}. 
        You MUST respond ONLY with a valid JSON array of objects. Do not use markdown blocks.
        Format exactly like this:
        [
          {"q": "Question text?", "options": ["A", "B", "C", "D"], "answer": 1},
          {"q": "Next question?", "options": ["A", "B", "C", "D"], "answer": 0}
        ]
        The "answer" must be the integer index (0, 1, 2, or 3) of the correct option in the array.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const data = await response.json();
            
            // Extract the text from the AI's response
            let aiText = data.candidates[0].content.parts[0].text;
            
            // Clean up the response in case the AI wraps it in markdown backticks
            aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
            
            // Convert the text into a JavaScript array
            currentQuestions = JSON.parse(aiText);
            
            startQuiz();

        } catch (error) {
            console.error("Error fetching from AI:", error);
            alert("Oops! The AI had trouble generating questions. Check the console or try a different skill.");
            loadingText.classList.add('hidden');
        }
    }

    function startQuiz() {
        loadingText.classList.add('hidden');
        selectionScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('quiz-title').innerText = currentSkill + " Assessment";
        loadQuestion();
    }

    function loadQuestion() {
        const questionData = currentQuestions[currentQuestionIndex];
        document.getElementById('question-text').innerText = questionData.q;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ""; 

        questionData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'option-btn';
            btn.onclick = () => checkAnswer(index);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex) {
        const correctIndex = currentQuestions[currentQuestionIndex].answer;
        if (selectedIndex === correctIndex) {
            score++;
        }
        currentQuestionIndex++;

        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        
        const totalQuestions = currentQuestions.length;
        document.getElementById('score-text').innerText = `You scored ${score} out of ${totalQuestions}.`;
        
        const resultMessage = document.getElementById('result-message');
        if (score === totalQuestions) {
            resultMessage.innerText = "Excellent potential! The AI thinks you are ready to level up.";
            resultMessage.style.color = "green";
        } else if (score > 0) {
            resultMessage.innerText = "Good start! Review your basics, and you'll be ready to level up soon.";
            resultMessage.style.color = "orange";
        } else {
            resultMessage.innerText = "Keep practicing! Master the fundamentals before trying to level up.";
            resultMessage.style.color = "red";
        }
    }

    function resetApp() {
        resultScreen.classList.add('hidden');
        selectionScreen.classList.remove('hidden');
        document.getElementById('skill-input').value = "";
    }
</script>

</body>
</html>
